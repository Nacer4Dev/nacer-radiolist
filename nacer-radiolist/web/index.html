<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>nacer-radiolist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --green:       #00ff88;
      --green-dim:   #00c96a;
      --green-talk:  #00ffaa;
      --bg-panel:    rgba(4, 18, 10, 0.78);
      --bg-item:     rgba(0, 255, 136, 0.04);
      --bg-talk:     rgba(0, 255, 136, 0.13);
      --border:      rgba(0, 255, 136, 0.20);
      --border-talk: rgba(0, 255, 136, 0.60);
      --text:        rgba(210, 255, 235, 0.88);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: transparent !important;
      overflow: hidden;
    }

    #radio-list {
      position: fixed;
      top: 50%;
      right: 0;
      transform: translateY(-50%);
      display: none; 
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      z-index: 9999;
    }

    #radio-list-header {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-right: none;
      border-radius: 6px 0 0 6px;
      padding: 5px 14px 5px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: blink 2s infinite;
      flex-shrink: 0;
    }
    @keyframes blink {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.3; }
    }

    .header-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--green);
      text-transform: uppercase;
    }
    .header-channel {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--green-dim);
      letter-spacing: 1px;
    }

    #radio-list-box {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-right: none;
      border-radius: 6px 0 0 6px;
      padding: 5px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 140px;
      max-width: 260px;
    }

    .radio-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      padding: 4px 8px 4px 10px;
      border-radius: 4px;
      background: var(--bg-item);
      border: 1px solid var(--border);
      border-left: 2px solid var(--green-dim);
      transition: background 0.2s, border-color 0.2s;
    }

    .radio-name {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 500;
      font-size: 12px;
      color: var(--text);
      white-space: nowrap;
      letter-spacing: 0.5px;
    }

    .talking {
      background: var(--bg-talk);
      border-color: var(--border-talk);
      border-left-color: var(--green);
      box-shadow: 0 0 8px rgba(0, 255, 136, 0.15);
    }
    .talking .radio-name {
      color: var(--green-talk);
      font-weight: 700;
      text-shadow: 0 0 6px rgba(0, 255, 136, 0.45);
    }

    .soundwave {
      display: none;
      align-items: flex-end;
      justify-content: center;
      gap: 2px;
      height: 12px;
      width: 18px;
      flex-shrink: 0;
    }
    .talking .soundwave {
      display: flex;
    }
    .soundwave span {
      display: block;
      width: 2px;
      background: var(--green);
      border-radius: 1px;
      animation: wave 0.55s infinite ease-in-out alternate;
    }
    .soundwave span:nth-child(1) { animation-delay: 0.00s; }
    .soundwave span:nth-child(2) { animation-delay: 0.11s; }
    .soundwave span:nth-child(3) { animation-delay: 0.22s; }
    .soundwave span:nth-child(4) { animation-delay: 0.11s; }
    .soundwave span:nth-child(5) { animation-delay: 0.00s; }
    @keyframes wave {
      from { height: 3px;  opacity: 0.5; }
      to   { height: 12px; opacity: 1.0; }
    }
  </style>

  <script>
    var radioOrder = {};

    function getBox() {
      return document.getElementById("radio-list-box");
    }

    function showList() {
      document.getElementById("radio-list").style.display = "flex";
    }

    function hideList() {
      document.getElementById("radio-list").style.display = "none";
    }

    function clearList() {
      var el = document.getElementById("radio-list");
      while (el.firstChild) el.removeChild(el.firstChild);
      radioOrder = {};
      hideList();
    }

    function ensureStructure(channel) {
      var el = document.getElementById("radio-list");
      if (!document.getElementById("radio-list-box")) {
        var header = document.createElement("div");
        header.id = "radio-list-header";
        header.innerHTML =
          '<div class="header-dot"></div>' +
          '<span class="header-label">Radio</span>' +
          '<span class="header-channel">CH&middot;' + channel + '</span>';

        var box = document.createElement("div");
        box.id = "radio-list-box";

        el.appendChild(header);
        el.appendChild(box);
      }
      showList();
    }

    window.addEventListener("message", function (event) {
      var data = event.data;

      if (data.radioId != null) {
        var box = getBox();

        if (data.radioName != null) {
          ensureStructure(data.channel);
          box = getBox();

          var row = document.createElement("div");
          row.id = "radio-list-item-" + data.radioId;
          row.className = "radio-item";

          var nm = document.createElement("div");
          nm.className = "radio-name";
          nm.textContent = data.radioName;

          var wv = document.createElement("div");
          wv.className = "soundwave";
          for (var i = 0; i < 5; i++) {
            var s = document.createElement("span");
            wv.appendChild(s);
          }

          row.appendChild(nm);
          row.appendChild(wv);

          radioOrder[data.radioId] = box.children.length;
          box.appendChild(row);

        } else if (data.radioTalking != null) {
          var row = document.getElementById("radio-list-item-" + data.radioId);
          if (row) {
            if (data.radioTalking) {
              row.classList.add("talking");
            } else {
              row.classList.remove("talking");
            }
          }

        } else {
          var row = document.getElementById("radio-list-item-" + data.radioId);
          if (row && box) {
            box.removeChild(row);
            delete radioOrder[data.radioId];
            if (box.children.length === 0) {
              clearList();
            }
          }
        }
      }

      if (data.clearRadioList) {
        clearList();
      }

      if (data.changeVisibility) {
        if (data.visible) {
          showList();
        } else {
          hideList();
        }
      }
    });
  </script>
</head>
<body>
  <div id="radio-list"></div>
</body>
</html>
